name: "🛠 Task"
description: "Feature / Enhancement / Bugfix 등을 구성하는 하위 작업"
labels: ["task"]
type: task

body:
  - type: markdown
    attributes:
      value: |
        ```Task``` Feature / Enhancement / Bugfix 등을 구성하는 하위 작업
  - type: textarea
    id: Description
    attributes:
      label: Add a description
      placeholder: "A clear and concise description of what the task is."
      value: |
        ## 작업 내용
        - 반드시 체크리스트로 작성하지 않아도 됨
        - 자유롭게 작업내용을 간략하게 작성
        - 하위 태스크가 있다면 생략 가능
        - [ ] 작업 항목
        - [ ] 작업 항목
        
        ## 참고 (선택)
        - 참조 링크
        - 노션 관련 링크(분석, 설계 등)
        - 스크린샷 (선택)
    validations:
      required: true
